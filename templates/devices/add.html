{% extends "dashboard_base.html" %}

{% block title %}Add Device - EnergyTrack{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h3 class="mb-4"><i class="bi bi-plus-circle"></i> Add New Device</h3>
                    
                    <form method="POST" action="{{ url_for('devices.add_device') }}">
                        <div class="mb-3">
                            <label class="form-label">Device Name</label>
                            <input type="text" class="form-control" name="device_name" placeholder="e.g., Living Room Light" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Device Type</label>
                            <select class="form-select" name="device_type" required>
                                <option value="">Select Type</option>
                                <option value="light">💡 Light</option>
                                <option value="fan">🌀 Fan</option>
                                <option value="ac">❄️ Air Conditioner</option>
                                <option value="heater">🔥 Heater</option>
                                <option value="other">🔌 Other</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Power Rating (Watts)</label>
                            <input type="number" class="form-control" name="power_rating" placeholder="e.g., 60" step="0.1" value="0">
                            <div class="form-text">Approximate power consumption in Watts</div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Room/Location</label>
                            <select class="form-select" name="room">
                                <option value="">Select Room</option>
                                <option value="bedroom">Bedroom</option>
                                <option value="living_room">Living Room</option>
                                <option value="kitchen">Kitchen</option>
                                <option value="bathroom">Bathroom</option>
                                <option value="dining">Dining Room</option>
                                <option value="office">Office</option>
                                <option value="garage">Garage</option>
                                <option value="outdoor">Outdoor</option>
                            </select>
                        </div>
                        
                        <div class="alert alert-info">
                            <i class="bi bi-info-circle"></i> This is a dummy IoT implementation. In production, you would configure actual device credentials.
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="bi bi-check-circle"></i> Add Device
                            </button>
                            <a href="{{ url_for('devices.index') }}" class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
