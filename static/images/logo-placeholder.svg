<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Circular arrows (blue and green) -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#03A9F4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="white"/>
  
  <!-- Blue circular arrow (top) -->
  <path d="M 256 80 A 176 176 0 0 1 420 256" stroke="url(#blueGrad)" stroke-width="40" fill="none" stroke-linecap="round"/>
  <polygon points="440,240 460,256 440,272" fill="#03A9F4"/>
  
  <!-- Green circular arrow (bottom) -->
  <path d="M 256 432 A 176 176 0 0 1 92 256" stroke="url(#greenGrad)" stroke-width="40" fill="none" stroke-linecap="round"/>
  <polygon points="72,272 52,256 72,240" fill="#8BC34A"/>
  
  <!-- House icon -->
  <g transform="translate(256, 320)">
    <path d="M -60,-40 L 0,-80 L 60,-40 L 60,40 L -60,40 Z" fill="#2196F3" stroke="#1976D2" stroke-width="3"/>
    <rect x="-20" y="-10" width="40" height="50" fill="#4CAF50"/>
    <circle cx="0" cy="-40" r="8" fill="#FFC107"/>
  </g>
  
  <!-- Chart bars -->
  <g transform="translate(200, 280)">
    <rect x="0" y="-40" width="15" height="40" fill="#4CAF50" opacity="0.8"/>
    <rect x="20" y="-60" width="15" height="60" fill="#4CAF50" opacity="0.9"/>
    <rect x="40" y="-80" width="15" height="80" fill="#4CAF50"/>
  </g>
  
  <!-- Circuit pattern -->
  <g opacity="0.6">
    <circle cx="256" cy="180" r="6" fill="#2196F3"/>
    <line x1="256" y1="180" x2="280" y2="160" stroke="#2196F3" stroke-width="2"/>
    <circle cx="280" cy="160" r="4" fill="#2196F3"/>
    <line x1="256" y1="180" x2="230" y2="160" stroke="#2196F3" stroke-width="2"/>
    <circle cx="230" cy="160" r="4" fill="#2196F3"/>
  </g>
  
  <!-- Dollar sign -->
